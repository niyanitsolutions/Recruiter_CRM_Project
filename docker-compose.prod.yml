version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION — EC2 server
# MongoDB Atlas is external; frontend is on S3/CloudFront
#
# First-time setup on EC2:
#   docker volume create uploads_data
#   docker volume create redis_data
#   export ECR_IMAGE=<account>.dkr.ecr.ap-south-1.amazonaws.com/crm-backend:latest
#
# Start:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Update after new deployment:
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: hireflow_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --save 300 10
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: ${ECR_IMAGE}
    container_name: hireflow_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - /home/ubuntu/crm-backend/.env
    environment:
      # Redis uses the internal Docker network (no port exposed externally)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  redis_data:
    external: true    # Pre-created: docker volume create redis_data
  uploads_data:
    external: true    # Pre-created: docker volume create uploads_data
