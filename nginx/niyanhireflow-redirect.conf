# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Permanent redirect: niyanhireflow.com → web.hireflowcrm.com
# File location on server: /etc/nginx/sites-available/niyanhireflow-redirect
#
# niyanhireflow.com is a RETIRED production domain. It must not serve its own
# copy of the frontend — every request (any path, any query string) gets a
# 301 redirect to the same path on web.hireflowcrm.com, which is now the only
# production CRM origin.
#
#   https://niyanhireflow.com/login        → https://web.hireflowcrm.com/login
#   https://niyanhireflow.com/dashboard    → https://web.hireflowcrm.com/dashboard
#   https://www.niyanhireflow.com/anything → https://web.hireflowcrm.com/anything
#
# Prerequisites (must be done BEFORE installing this file):
#   1. DNS: niyanhireflow.com and www.niyanhireflow.com A/ALIAS records must
#      point at this EC2 instance's Elastic IP (same one web.hireflowcrm.com
#      uses). If they still point at the old CloudFront distribution, this
#      config will simply never receive traffic — fix DNS first.
#   2. A valid SSL cert for niyanhireflow.com + www.niyanhireflow.com on THIS
#      box, obtained via:
#        sudo certbot certonly --nginx -d niyanhireflow.com -d www.niyanhireflow.com
#      (certonly, not --nginx's auto-install mode, since we're hand-writing
#      the server block below — certbot will still manage renewal for it.)
#
# Install:
#   sudo cp nginx/niyanhireflow-redirect.conf /etc/nginx/sites-available/niyanhireflow-redirect
#   sudo ln -sf /etc/nginx/sites-available/niyanhireflow-redirect /etc/nginx/sites-enabled/niyanhireflow-redirect
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP — redirect straight to the target's HTTPS URL (skip the extra hop of
#    redirecting to https://niyanhireflow.com first). ACME challenge path is
#    still served locally so certbot renewal keeps working. ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name niyanhireflow.com www.niyanhireflow.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://web.hireflowcrm.com$request_uri;
    }
}

# ── HTTPS — redirect everything to web.hireflowcrm.com, path preserved ──────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name niyanhireflow.com www.niyanhireflow.com;

    # SSL — managed by Certbot for THIS domain (separate cert from
    # web.hireflowcrm.com's). Adjust paths if `certbot certificates` shows
    # a different cert name.
    ssl_certificate     /etc/letsencrypt/live/niyanhireflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/niyanhireflow.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    location / {
        return 301 https://web.hireflowcrm.com$request_uri;
    }
}
