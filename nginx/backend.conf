# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Same-Origin Full Stack for web.hireflowcrm.com
# File location on server: /etc/nginx/sites-available/crm-backend
#
# Serves:
#   • React SPA (Vite build)  from /var/www/web.hireflowcrm.com/current
#                             (a symlink — see scripts/deploy-frontend.sh)
#   • FastAPI backend         proxied from http://127.0.0.1:8000
#   on a SINGLE origin: https://web.hireflowcrm.com  (no api.* subdomain)
#
# This is the ONLY production frontend. Any other domain (e.g. a former
# niyanhireflow.com) must not serve its own copy of the app — it should
# 301-redirect here instead. See nginx/niyanhireflow-redirect.conf.
#
# Install:
#   sudo cp nginx/backend.conf /etc/nginx/sites-available/crm-backend
#   sudo ln -sf /etc/nginx/sites-available/crm-backend /etc/nginx/sites-enabled/crm-backend
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file assumes SSL was already issued for web.hireflowcrm.com via:
#   sudo certbot --nginx -d web.hireflowcrm.com
# which is why the 443 block below reuses certbot's standard managed paths
# (/etc/letsencrypt/live/web.hireflowcrm.com/*, options-ssl-nginx.conf,
# ssl-dhparam.pem) instead of redefining SSL/cipher settings. If your certbot
# run produced different paths, check `sudo certbot certificates` and adjust
# the two `ssl_certificate*` lines only — everything else can stay as-is.
#
# `root` points at /var/www/web.hireflowcrm.com/current, a symlink that
# scripts/deploy-frontend.sh atomically repoints at each new release
# directory. Nginx resolves symlinks per-request, so flipping the symlink
# is instant and glitch-free — no reload needed for a frontend-only deploy.
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting (shared across both server blocks below)
# api_general was 60r/m (1 req/sec sustained) with burst=30/100 — measured
# Network-tab evidence across dashboard/candidates/jobs/interviews pages shows
# a single page mount alone fires 5-8+ concurrent GETs (list + several
# dropdown/reference-data calls), before counting live-polling (every 5s per
# open tab) or multiple users sharing one office NAT IP ($binary_remote_addr
# buckets by IP, so this allowance is shared across everyone behind it, not
# per-user). 1 req/sec was never going to keep up with that steady-state load,
# so the bucket kept re-exhausting and nginx kept rejecting the overflow with
# its default 503 — confirmed by identical ~240ms timing and identical 0.8kB
# body across totally unrelated endpoints (dashboard-stats, candidates,
# notice-periods, interviews, etc.) in the reported Network tab captures, which
# is the signature of a gateway-level rejection, not a per-endpoint app bug.
# This is an internal, authenticated B2B tool, not a public API — a generous
# sustained rate is low-risk here.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=600r/m;

# api_auth guards credential-bearing endpoints ONLY (login, login-with-tenant).
# /auth/refresh was moved OUT of this zone (see api_refresh below): every hard
# page reload calls /auth/refresh, and all users behind one office NAT share
# one $binary_remote_addr bucket — at 10r/m the 11th reload in a minute got a
# 503, which the frontend treats as an expired session and force-logs the user
# out. Login attempts are human-paced and bcrypt-bound server-side, so 30r/m
# per IP still shuts down online brute force while letting a shared-NAT office
# actually log in at 9 AM.
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=30r/m;

# Token refresh: cheap, automatic, and fired by every open tab/page reload —
# needs a per-IP allowance sized for an office NAT, not for a single human.
limit_req_zone $binary_remote_addr zone=api_refresh:10m rate=120r/m;

# WebSocket upgrade pass-through. $connection_upgrade resolves to "upgrade"
# for WS handshakes and to "" (keep-alive) for plain requests, so the same
# proxy_set_header lines are correct for both.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# Nginx-level cache for uploaded files (/api/v1/uploads/...). Uploaded
# filenames are uuid4-unique and never rewritten, so long cache validity is
# safe. First request is proxied to FastAPI StaticFiles; repeats are served
# by nginx from disk — Python stops paying for every avatar/logo/photo view.
proxy_cache_path /var/cache/nginx/crm_uploads levels=1:2 keys_zone=crm_uploads:10m
                 max_size=1g inactive=7d use_temp_path=off;

upstream crm_backend_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP — redirect to HTTPS (Let's Encrypt HTTP-01 challenge still served) ──
server {
    listen 80;
    listen [::]:80;
    server_name web.hireflowcrm.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — React SPA + FastAPI reverse proxy, same origin ───────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name web.hireflowcrm.com;

    # SSL — managed by Certbot, left untouched
    ssl_certificate     /etc/letsencrypt/live/web.hireflowcrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.hireflowcrm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy — deliberately permissive on script/style
    # ('unsafe-inline'/'unsafe-eval' kept so the React SPA, inline style
    # attributes, and the Razorpay checkout are not broken) while enforcing the
    # high-value, zero-breakage directives: object-src none (no plugins),
    # base-uri self (no <base> injection), frame-ancestors self (clickjacking),
    # and upgrade-insecure-requests (no mixed content). Tightening script-src to
    # nonces/hashes should be a later, browser-tested change.
    # img-src allows https: because uploaded images may be served from S3 URLs;
    # connect/frame allow Razorpay; font/style allow Google Fonts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://checkout.razorpay.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;

    # Permissions-Policy — allow only what the app uses (geolocation for
    # attendance login, camera for QR asset scanning, payment for Razorpay),
    # deny the rest.
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=(self), fullscreen=(self)" always;

    # Resume/document uploads go through the API; keep this generous
    client_max_body_size 50M;

    # Rate-limit rejections must be 429 (Too Many Requests), not the default
    # 503 — the frontend treats 503 as a server failure (and on /auth/refresh
    # it force-logs the user out), while 429 is retryable.
    limit_req_status 429;

    # Compression — declared here so this vhost does not depend on whatever
    # gzip settings the box-level /etc/nginx/nginx.conf happens to have.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── React build ───────────────────────────────────────────────────────
    # "current" is a symlink to the active releases/<timestamp> dir — kept
    # this way so deploys are an atomic symlink swap, not an in-place copy.
    root /var/www/web.hireflowcrm.com;
    index index.html;

    # index.html — never cached, so new deploys are picked up immediately.
    # A location-level add_header suppresses all server-level add_headers, so
    # the security header set (incl. CSP) is repeated here — this is the HTML
    # document response where CSP/HSTS actually matter.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://checkout.razorpay.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=(self), fullscreen=(self)" always;
    }

    # Content-hashed static assets — cache forever
    # Negative lookahead excludes /api/ and /uploads/: without it, an uploaded
    # file like /api/v1/uploads/profiles/x.jpg matches this regex location
    # too, and nginx lets a regex location win over the plain-prefix /api/
    # and /uploads/ locations below regardless of prefix length — so uploaded
    # .jpg/.jpeg/.png/.gif/.svg files would be intercepted here and 404
    # against the SPA's build directory (try_files has no matching file)
    # instead of ever being proxied to FastAPI.
    location ~* ^/(?!api/|uploads/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── FastAPI — WebSocket endpoints ───────────────────────────────────────
    # /api/v1/ws/session (session events) and /api/v1/crm/ws (CRM live events).
    # Regex locations are evaluated in file order, so this MUST come before the
    # auth regex below. Without Upgrade/Connection pass-through the WS
    # handshake can never complete and every client falls back to HTTP polling.
    # The backend pings over the socket, which keeps the 3600s read window open.
    location ~ ^/api/v1/(ws/|crm/ws$) {
        # The WS handshake carries the JWT in the query string
        # (?token=...). access_log off keeps that token out of the nginx
        # access log ($request logs the full path+query). The socket is
        # authenticated by the backend on connect regardless.
        access_log off;
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_buffering    off;
    }

    # ── FastAPI — credential endpoints (brute-force guard) ──────────────────
    location ~ ^/api/v1/auth/(login|login-with-tenant)$ {
        limit_req zone=api_auth burst=20 nodelay;
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── FastAPI — token refresh (own zone; fired on every page reload) ──────
    location = /api/v1/auth/refresh {
        limit_req zone=api_refresh burst=100 nodelay;
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── FastAPI — uploaded files under the API prefix ────────────────────────
    # upload_file() returns /api/v1/uploads/... URLs, which previously fell
    # into the generic /api/ location: rate-limited, proxied to Python on
    # every view, and sent with NO cache headers. `^~` wins over the regex
    # locations above, so files land here: nginx-cached on disk, browser-
    # cached for 7 days, exempt from limit_req.
    location ^~ /api/v1/uploads/ {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache            crm_uploads;
        proxy_cache_valid 200  7d;
        proxy_cache_valid 404  1m;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
        # add_header in a location suppresses server-level headers — re-add
        # the security set (nosniff matters most for user-uploaded content).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── FastAPI — all other API routes ──────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=300 nodelay;
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;    # longer for reports / bulk uploads
    }

    # ── FastAPI — uploaded files, legacy bare /uploads/ URLs ─────────────────
    location /uploads/ {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache            crm_uploads;
        proxy_cache_valid 200  7d;
        proxy_cache_valid 404  1m;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── FastAPI — OpenAPI / docs / redoc / health ───────────────────────────
    location /docs {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://crm_backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── React Router — everything else falls back to index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/crm-backend-access.log;
    error_log  /var/log/nginx/crm-backend-error.log warn;
}
