# ─────────────────────────────────────────────────────────────────────────────
# EC2 Nginx Configuration — Backend API Reverse Proxy
# File location on EC2: /etc/nginx/sites-available/crm-backend
#
# Setup:
#   sudo cp nginx/backend.conf /etc/nginx/sites-available/crm-backend
#   sudo ln -s /etc/nginx/sites-available/crm-backend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get SSL:
#   sudo certbot --nginx -d api.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name api.yourdomain.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL — managed by Certbot (auto-filled after: sudo certbot --nginx)
    # ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for resume/document uploads)
    client_max_body_size 50M;

    # Auth endpoints — stricter rate limit
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    # All API routes
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # FastAPI OpenAPI docs (disable in production if needed)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        include /etc/nginx/proxy_params;
    }

    # Access logs
    access_log /var/log/nginx/crm-backend-access.log;
    error_log  /var/log/nginx/crm-backend-error.log warn;
}
