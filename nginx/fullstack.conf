# ─────────────────────────────────────────────────────────────────────────────
# EC2 Nginx — Full Stack: Frontend (React) + Backend (FastAPI) on ONE server
#
# Use this when:
#   • You are NOT using S3/CloudFront for the frontend
#   • Frontend build (dist/) lives on the same EC2 as the backend
#   • You want nginx to serve React and proxy /api/ to FastAPI
#
# Setup:
#   1. Build the frontend:
#        cd /home/ubuntu/crm-project/frontend
#        VITE_API_URL=/api/v1 npm run build
#        sudo cp -r dist/* /var/www/crm/
#
#   2. Install this config:
#        sudo cp nginx/fullstack.conf /etc/nginx/sites-available/crm
#        sudo ln -s /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo nginx -t && sudo systemctl reload nginx
#
#   3. (Optional) Get SSL:
#        sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# After any frontend rebuild: sudo cp -r dist/* /var/www/crm/
# After any backend update:   docker-compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

# Rates aligned with nginx/backend.conf (the live vhost) — see the comments
# there for why: general traffic includes 5-8 calls per page mount, auth is
# per-IP and shared across office NAT, and refresh fires on every page reload.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=600r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_refresh:10m rate=120r/m;

# WebSocket upgrade pass-through ("upgrade" for WS handshakes, keep-alive otherwise)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    # ── Static frontend ───────────────────────────────────────────────────
    root  /var/www/crm;
    index index.html;

    # Max upload size (resume/document uploads go through the API)
    client_max_body_size 50M;

    # Cache immutable static assets (hashed filenames from Vite build)
    location ~* ^/(?!api/|uploads/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rate-limit rejections are retryable — return 429, not 503
    limit_req_status 429;

    # ── WebSocket endpoints (must precede the auth regex; file order wins) ──
    location ~ ^/api/v1/(ws/|crm/ws$) {
        access_log off;   # keep the ?token= JWT out of the access log
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── API proxy — credential endpoints (brute-force guard) ──────────────
    location ~ ^/api/v1/auth/(login|login-with-tenant)$ {
        limit_req zone=api_auth burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API proxy — token refresh (own generous zone) ─────────────────────
    location = /api/v1/auth/refresh {
        limit_req zone=api_refresh burst=100 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Uploaded files under the API prefix — cached, not rate-limited ────
    location ^~ /api/v1/uploads/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── API proxy — all other API calls ───────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=300 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;    # longer for file uploads / reports
        proxy_connect_timeout 10s;
    }

    # ── Uploaded files (resumes, documents) ──────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── React Router — all unknown paths fall back to index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # See nginx/backend.conf for the rationale behind this CSP (permissive on
    # script/style to avoid SPA/Razorpay breakage; strict on object/base/frame).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://checkout.razorpay.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=(self), fullscreen=(self)" always;

    access_log /var/log/nginx/crm-access.log;
    error_log  /var/log/nginx/crm-error.log warn;
}

