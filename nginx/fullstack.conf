# ─────────────────────────────────────────────────────────────────────────────
# EC2 Nginx — Full Stack: Frontend (React) + Backend (FastAPI) on ONE server
#
# Use this when:
#   • You are NOT using S3/CloudFront for the frontend
#   • Frontend build (dist/) lives on the same EC2 as the backend
#   • You want nginx to serve React and proxy /api/ to FastAPI
#
# Setup:
#   1. Build the frontend:
#        cd /home/ubuntu/crm-project/frontend
#        VITE_API_URL=/api/v1 npm run build
#        sudo cp -r dist/* /var/www/crm/
#
#   2. Install this config:
#        sudo cp nginx/fullstack.conf /etc/nginx/sites-available/crm
#        sudo ln -s /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo nginx -t && sudo systemctl reload nginx
#
#   3. (Optional) Get SSL:
#        sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# After any frontend rebuild: sudo cp -r dist/* /var/www/crm/
# After any backend update:   docker-compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    # ── Static frontend ───────────────────────────────────────────────────
    root  /var/www/crm;
    index index.html;

    # Max upload size (resume/document uploads go through the API)
    client_max_body_size 50M;

    # Cache immutable static assets (hashed filenames from Vite build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy — auth endpoints (stricter rate limit) ──────────────────
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API proxy — all other API calls ───────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;    # longer for file uploads / reports
        proxy_connect_timeout 10s;
    }

    # ── Uploaded files (resumes, documents) ──────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── React Router — all unknown paths fall back to index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/crm-access.log;
    error_log  /var/log/nginx/crm-error.log warn;
}

