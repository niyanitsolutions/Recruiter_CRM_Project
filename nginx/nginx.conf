# ─────────────────────────────────────────────────────────────────────────────
# Main Nginx Configuration
# Copy to EC2: sudo cp nginx/nginx.conf /etc/nginx/nginx.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

user www-data;

# Auto-detect CPU cores
worker_processes auto;

# Max open files per worker (match system ulimit -n)
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format (includes response time)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;   # Hide nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Security: limit request body (overridden per-server for upload endpoints)
    client_max_body_size 10M;

    # Upstream — FastAPI backend
    upstream backend_api {
        server 127.0.0.1:8000;
        keepalive 32;          # keep 32 connections warm to the app server
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;         # replace with your domain in production

        root /var/www/niyan-hireflow/dist;
        index index.html;

        # ── index.html — never cached ─────────────────────────────────────────
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── Static assets (content-hashed by Vite) — immutable 1 year ────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── API reverse proxy ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Increase body limit for resume/document uploads
            client_max_body_size 20M;
        }

        # ── Uploaded files (resumes, docs) ────────────────────────────────────
        location /uploads/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Include virtual host configs
    include /etc/nginx/sites-enabled/*;
    include /etc/nginx/conf.d/*.conf;
}
