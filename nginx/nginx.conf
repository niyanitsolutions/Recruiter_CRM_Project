# ─────────────────────────────────────────────────────────────────────────────
# Main Nginx Configuration
# Copy to EC2: sudo cp nginx/nginx.conf /etc/nginx/nginx.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

user www-data;

# Auto-detect CPU cores
worker_processes auto;

# Max open files per worker (match system ulimit -n)
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format (includes response time)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;   # Hide nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Security: limit request body (overridden per-server for upload endpoints)
    client_max_body_size 10M;

    # Upstream — FastAPI backend
    upstream backend_api {
        server 127.0.0.1:8000;
        keepalive 32;          # keep 32 connections warm to the app server
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;         # replace with your domain in production

        root /var/www/niyan-hireflow/dist;
        index index.html;

        # ── index.html — never cached ─────────────────────────────────────────
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── Static assets (content-hashed by Vite) — immutable 1 year ────────
        # Negative lookahead excludes /api/ and /uploads/: a regex location
        # otherwise wins over the plain-prefix /api/ and /uploads/ locations
        # below regardless of prefix length, so an uploaded .jpg/.png file
        # under /api/v1/uploads/... would be intercepted here instead of
        # proxied to the backend.
        location ~* ^/(?!api/|uploads/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── WebSocket endpoints ───────────────────────────────────────────────
        # /api/v1/ws/session and /api/v1/crm/ws. Connection/Upgrade are
        # hardcoded (this location only ever serves WS handshakes) instead of
        # using a map, so this file cannot collide with the $connection_upgrade
        # map defined in sites-enabled vhosts (nginx/backend.conf).
        location ~ ^/api/v1/(ws/|crm/ws$) {
            access_log off;   # keep the ?token= JWT out of the access log
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ── Uploaded files under the API prefix — browser-cacheable ──────────
        # upload_file() returns /api/v1/uploads/... URLs; without this location
        # they fall into /api/ below and are re-fetched uncached on every view.
        location ^~ /api/v1/uploads/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── API reverse proxy ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Increase body limit for resume/document uploads
            client_max_body_size 20M;
        }

        # ── Uploaded files (resumes, docs) ────────────────────────────────────
        location /uploads/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # See nginx/backend.conf for CSP rationale (permissive script/style, strict object/base/frame).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://checkout.razorpay.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=(self), fullscreen=(self)" always;
    }

    # Include virtual host configs
    include /etc/nginx/sites-enabled/*;
    include /etc/nginx/conf.d/*.conf;
}
