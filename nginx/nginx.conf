# ─────────────────────────────────────────────────────────────────────────────
# Main Nginx Configuration
# Copy to EC2: sudo cp nginx/nginx.conf /etc/nginx/nginx.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

user www-data;

# Auto-detect CPU cores
worker_processes auto;

# Max open files per worker (match system ulimit -n)
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format (includes response time)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;   # Hide nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Security: limit request body (overridden per-server for upload endpoints)
    client_max_body_size 10M;

    # Include virtual host configs
    include /etc/nginx/sites-enabled/*;
    include /etc/nginx/conf.d/*.conf;
}
