name: PR Checks

# Run on every Pull Request to main
on:
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Lint + Test ─────────────────────────────────────────────────────
  backend-checks:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          cd backend
          python -m flake8 app/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations \
            --count --statistics
        continue-on-error: true

      - name: Check formatting with black
        run: |
          cd backend
          python -m black app/ --check --line-length=120
        continue-on-error: true

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          MONGODB_URI: mongodb://localhost:27017
          MASTER_DB_NAME: test_master_db
          JWT_SECRET_KEY: test-secret-key-for-ci-pipeline-only-64chars
          JWT_ALGORITHM: HS256
          REDIS_URL: redis://localhost:6379/0
        continue-on-error: true

  # ── Frontend: Build Check ────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build check
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://api.example.com/api/v1
          VITE_APP_NAME: CRM Platform
          VITE_RAZORPAY_KEY_ID: rzp_test_dummy

      - name: Lint check
        run: |
          cd frontend
          npm run lint
        continue-on-error: true
