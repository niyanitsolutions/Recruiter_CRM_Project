name: Deploy Backend

# Triggers: push to main branch when backend files change
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  AWS_REGION:      ap-south-1
  ECR_REPOSITORY:  crm-backend          # must match var.ecr_repository_name in Terraform
  ECS_CLUSTER:     crm-cluster-prod     # must match aws_ecs_cluster.main.name
  ECS_SERVICE:     crm-backend-prod     # must match aws_ecs_service.backend.name
  CONTAINER_NAME:  backend              # must match container name in task definition
  IMAGE_TAG:       ${{ github.sha }}    # unique tag per commit (SHA)

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || true
        env:
          MONGODB_URI:      mongodb://localhost:27017
          MASTER_DB_NAME:   test_master_db
          JWT_SECRET_KEY:   test-secret-key-for-ci-only-32chars
          JWT_ALGORITHM:    HS256
          REDIS_URL:        redis://localhost:6379/0

  # ── Job 2: Build & Push Docker Image to ECR ───────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend

          # Build image with both a commit-SHA tag and :latest
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy to ECS Fargate ──────────────────────────────────────────
  # Uses official AWS actions — no SSH, no EC2 required.
  # Flow:
  #   1. Download the current task definition JSON from ECS
  #   2. Replace the container image URI with the new ECR image
  #   3. Register the updated task definition revision
  #   4. Update the ECS service to use the new revision (rolling deploy)
  #   5. Wait until all tasks are healthy (circuit breaker auto-rolls back on failure)
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Download the CURRENT task definition from ECS (latest active revision).
      # This preserves all existing settings (secrets, env vars, CPU, memory, etc.)
      # and only swaps the image URI.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query taskDefinition \
            > task-definition.json
          echo "Current task definition downloaded."
          cat task-definition.json | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          # Remove fields that cannot be re-registered
          for field in ['taskDefinitionArn','revision','status','requiresAttributes',
                        'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(field, None)
          print(json.dumps(td, indent=2))
          " > task-definition-clean.json
          mv task-definition-clean.json task-definition.json

      # Inject the new image URI into the task definition JSON for our container.
      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build-and-push.outputs.image }}

      # Register the new task definition revision and update the ECS service.
      # ECS performs a rolling deployment:
      #   - Starts new tasks with the new image
      #   - Runs ALB health checks
      #   - Terminates old tasks only after new ones are healthy
      #   - Auto-rolls back if health checks fail (circuit breaker enabled in Terraform)
      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true   # block until all tasks are running & healthy
          wait-for-minutes:         10       # timeout after 10 minutes

      - name: Deployment summary
        run: |
          echo "✅ Deployed ${{ needs.build-and-push.outputs.image }}"
          echo "   Cluster : $ECS_CLUSTER"
          echo "   Service : $ECS_SERVICE"
          echo "   Region  : $AWS_REGION"
